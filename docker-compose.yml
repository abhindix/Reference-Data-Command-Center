version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: loan_ref_db
    environment:
      POSTGRES_USER: loan_user
      POSTGRES_PASSWORD: loan_password
      POSTGRES_DB: loan_ref_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: loan_ref_app
    environment:
      DATABASE_URL: postgresql://loan_user:loan_password@db:5432/loan_ref_db
      AWS_REGION: us-east-1
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
